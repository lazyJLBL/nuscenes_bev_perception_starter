# =============================================================================
# model.yaml — 3D 检测模型配置
# =============================================================================

# 选用的 baseline 模型
baseline_model: "pointpillars"

# 检测框架（mmdetection3d 或 openpcdet 或 simple_pillars）
detection_framework: "simple_pillars"

# 自包含的简易检测器配置
detection:
  framework: "simple_pillars"
  work_dir: "outputs/predictions/train_results"
  prediction_file: "outputs/predictions/detection_results.json"
  metrics_file: "outputs/predictions/metrics_summary.json"
  epochs: 1
  batch_size: 2
  workers: 0
  learning_rate: 0.001
  device: "auto"

# PointPillars 相关配置 (用于数据处理)
pointpillars:
  # 点云体素化参数 (nuScenes 标准)
  voxel_size: [0.2, 0.2, 8.0]
  point_cloud_range: [-51.2, -51.2, -5.0, 51.2, 51.2, 3.0]
  max_num_points_per_voxel: 64
  max_voxels: 30000

  # 训练参数
  train:
    batch_size: 4
    num_epochs: 20
    learning_rate: 0.001
    weight_decay: 0.01

  # 推理参数
  inference:
    score_threshold: 0.3
    nms_threshold: 0.2
