# =============================================================================
# model.yaml — 3D 检测模型配置
# =============================================================================

# 选用的 baseline 模型
baseline_model: "pointpillars"

# 检测框架（mmdetection3d 或 openpcdet）
detection_framework: "mmdetection3d"

# PointPillars 相关配置
pointpillars:
  # 点云体素化参数
  voxel_size: [0.2, 0.2, 8.0]
  point_cloud_range: [-50.0, -50.0, -5.0, 50.0, 50.0, 3.0]
  max_num_points_per_voxel: 64
  max_voxels: 30000

  # 训练参数
  train:
    batch_size: 4
    num_epochs: 20
    learning_rate: 0.001
    weight_decay: 0.01

  # 推理参数
  inference:
    score_threshold: 0.3
    nms_threshold: 0.2

# MMDetection3D 相关路径（安装后填入）
mmdet3d:
  # MMDetection3D 安装路径（如果使用 pip 安装则不需要填写）
  install_path: ""
  # 配置文件路径（相对于 mmdet3d 安装目录）
  config_file: "configs/pointpillars/pointpillars_hv_secfpn_8xb6-160e_kitti-3d-3class.py"
  # 预训练权重路径（可选）
  checkpoint_file: ""
